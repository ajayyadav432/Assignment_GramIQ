name: CI/CD

on:
  push:
    branches: [main, dev, feature/*]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: krishiclinic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: |
          pip install ruff
          ruff check app/ tests/ --fix || true

      - name: Type check (py_compile)
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/services/prediction_service.py

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/krishiclinic_test
          AI_PROVIDER: mock
        run: pytest tests/ -v --tb=short

  frontend-build:
    name: Frontend — TypeScript & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true

      - name: Production build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t krishi-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t krishi-frontend:ci ./frontend

  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: frontend-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Deploy
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret is not set. Skipping Vercel deployment."
          else
            npm ci
            npx -y vercel --prod --yes --token "$VERCEL_TOKEN"
          fi
