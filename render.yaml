services:
  # 1. Managed PostgreSQL Database
  - type: db
    name: gramiq-db
    databaseName: krishiclinic
    user: postgres
    plan: free # Can be upgraded to starter or standard
    ipAllowList:
      - source: 0.0.0.0/0
        description: "Allow Vercel frontend and external tools connection"

  # 2. FastAPI Python Web Service (Backend)
  - type: web
    name: gramiq-backend
    env: python
    plan: free
    buildCommand: cd backend && pip install --upgrade pip && pip install -r requirements.txt && PYTHONPATH=. alembic upgrade head
    startCommand: cd backend && PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: gramiq-db
          property: connectionString
      - key: AI_PROVIDER
        value: mock # Default provider, user can override to gemini/groq in dashboard
      - key: GEMINI_API_KEY
        sync: false # Set this in Render dashboard settings if using gemini
      - key: GROQ_API_KEY
        sync: false # Set this in Render dashboard settings if using groq
      - key: UPLOAD_DIR
        value: uploads
